code: "en"
name: "English"
enabled: true

preprocessing:
  tokenizer: "spacy"
  remove_stopwords: true
  lowercase: true
  remove_punctuation: true

lexicon:
  database: "./data/lexicons/english_lexicon.db"
  seed_words: "./data/seed_words/english_seeds.json"
  min_frequency: 2

embedding:
  type: "glove"
  path: "./data/embeddings/english/"
  model: "glove.6B.300d.txt"
  dimension: 300
  fallback: "fasttext"

parser:
  type: "spacy"
  model: "en_core_web_sm"
  fallback: "keyword-based"

bias:
  demographic_groups: ["gender", "religion", "nationality", "race", "caste"]
  attributes: ["negative", "harmful", "stereotypical"]
